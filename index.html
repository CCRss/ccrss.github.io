<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GitHub Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header">
        <div id="profile-pic">
            <img src="img/girl1.jpg" alt="Your Photo">
        </div>
        <div id="description">
            <p>I want to create AGI</p>
        </div>
        <div id="social-icons">
            <a href="https://github.com/CCRss" target="_blank"><img src="assets/github_icon.png" alt="GitHub"></a>
            <a href="https://twitter.com/VladimirAlbrek1" target="_blank"><img src="assets/twitter_icon.png" alt="Twitter"></a>
            <!-- Add more icons here -->
        </div>
    </div>
    <hr>
    <div id="container">
        <div id="left-menu">
            Левое меню
            <!-- Project 1 details could be here if you wish -->
        </div>
        <div id="main-content">
            <div id="content">
                <h1>My projects</h1>
                <div id="projects-section">
                    <div id="project1" class="project-item">Long Term Memory Chat</div>
                    <div id="project2" class="project-item">Project 2</div>
                </div>
            </div>
            <div id="dynamic-content">
                <div id="project1-details" class="hidden-details">
                    <h2>Project 1 Details</h2>
                    <a href="https://github.com/CCRss/long_term_memory_chat">link</a>
                    <p>Long Term Memory Chat Assistant is an AI-powered conversational bot...</p>
                    <img src="img/ltmc.png" alt="">
                </div>
                <div id="project2-details" class="hidden-details">
                    <h2>Project 2 Details</h2>
                    <p>Information about project 2.</p>
                </div>
            </div>
        </div>
        <div id="right-menu">Правое меню</div>
        <div id="chat-bot">
            <div id="chat-header" onclick="toggleChat()">
                <span>Chat with Assistant</span>
            </div>
            <div id="chat-box" class="hidden">
                <div id="chat-content"></div>
                <input id="chat-input" type="text" placeholder="Type your message...">
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
